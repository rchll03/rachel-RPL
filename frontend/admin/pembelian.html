<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pembelian</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f7fb;
        }

        .card-custom{
            border:none;
            border-radius:15px;
            box-shadow:0 2px 10px rgba(0,0,0,.08);
        }

    </style>

</head>
<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card card-custom p-4">

                <h3 class="mb-4">
                    Tambah Pembelian
                </h3>


                <form method="POST">

                    <!-- Nama Barang -->
                    <div class="mb-3">

                        <label>
                            Nama Barang
                        </label>

                        <input
                                type="text"
                                name="nama_barang"
                                class="form-control"
                                required>

                    </div>



                    <!-- Supplier -->
                    <div class="mb-3">

                        <label>
                            Nama Supplier
                        </label>

                        <input
                                type="text"
                                name="supplier"
                                class="form-control"
                                required>

                    </div>



                    <!-- Qty -->
                    <div class="mb-3">

                        <label>
                            Qty
                        </label>

                        <input
                                type="number"
                                name="qty"
                                class="form-control"
                                required>

                    </div>



                    <!-- Satuan -->
                    <div class="mb-3">

                        <label>
                            Satuan
                        </label>

                        <select
                                name="satuan"
                                class="form-select"
                                required>

                            <option value="pcs">
                                PCS
                            </option>

                            <option value="kg">
                                KG
                            </option>

                            <option value="liter">
                                Liter
                            </option>

                            <option value="gram">
                                Gram
                            </option>

                            <option value="ml">
                                ML
                            </option>

                        </select>

                    </div>



                    <!-- Tipe -->
                    <div class="mb-4">

                        <label>
                            Tipe Barang
                        </label>

                        <select
                                name="tipe"
                                class="form-select"
                                required>

                            <option value="langsung">
                                Langsung
                            </option>

                            <option value="racikan">
                                Racikan
                            </option>

                        </select>

                    </div>



                    <button class="btn btn-primary w-100">

                        Simpan Pembelian

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
