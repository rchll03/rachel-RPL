
<!DOCTYPE html>
<html>
<head>

    <title>Dashboard Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/admin.css') }}">

</head>

<body class="bg-light">


<div class="container mt-5">

    <div class="card shadow">


        <!-- Header -->
        <div class="card-header d-flex justify-content-between align-items-center">

            <h3 class="mb-0">

                Dashboard Admin

            </h3>


            <a href="/logout"
               class="btn btn-danger">

                Logout

            </a>

        </div>



        <!-- Content -->
        <div class="card-body">


            <div class="row g-4">


                <!-- Kelola user -->
                <div class="col-md-4">

                    <a href="/kelola_user"
                       class="menu-card text-decoration-none">

                        <div class="card text-center shadow-sm">

                            <div class="card-body">

                                <h4>

                                    Kelola User

                                </h4>

                            </div>

                        </div>

                    </a>

                </div>



                <!-- Kelola produk -->
                <div class="col-md-4">

                    <a href="/kelola_produk"
                       class="menu-card text-decoration-none">

                        <div class="card text-center shadow-sm">

                            <div class="card-body">

                                <h4>

                                    Kelola Produk

                                </h4>

                            </div>

                        </div>

                    </a>

                </div>



                <!-- Inventory -->
                <div class="col-md-4">

                    <a href="/inventory"
                       class="menu-card text-decoration-none">

                        <div class="card text-center shadow-sm">

                            <div class="card-body">

                                <h4>

                                    Inventory

                                </h4>

                            </div>

                        </div>

                    </a>

                </div>


            </div>


        </div>

        <div class="row mt-4">

    <div class="col-md-3">

        <div class="card shadow-sm text-center">

            <div class="card-body">

                <h6>Total User</h6>

                <h3>{{ totalUser }}</h3>

            </div>

        </div>

    </div>


    <div class="col-md-3">

        <div class="card shadow-sm text-center">

            <div class="card-body">

                <h6>Total Produk</h6>

                <h3>{{ totalProduk }}</h3>

            </div>

        </div>

    </div>


    <div class="col-md-3">

        <div class="card shadow-sm text-center">

            <div class="card-body">

                <h6>Transaksi Hari Ini</h6>

                <h3>{{ totalTransaksi }}</h3>

            </div>

        </div>

    </div>


    <div class="col-md-3">

        <div class="card shadow-sm text-center">

            <div class="card-body">

                <h6>Pembelian Hari Ini</h6>

                <h3>{{ totalPembelian }}</h3>

            </div>

        </div>

    </div>

</div>
    </div>

</div>


<script src="{{ url_for('static', filename='js/admin.js') }}"></script>

</body>
</html>
