<!DOCTYPE html>
<html>
<head>

    <title>Inventory</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">


<div class="container mt-5">

    <div class="card shadow">


        <!-- header -->
        <div class="card-header d-flex justify-content-between align-items-center">

            <h3 class="mb-0">

                Inventory

            </h3>


            <a href="/admin"
               class="btn btn-primary">

                ← Dashboard Admin

            </a>

        </div>



        <div class="card-body">


            <!-- form -->
            <form action="/tambah_inventory"
                  method="POST">


                <div class="row g-3 mb-4">


                    <!-- produk -->
                    <div class="col-md-4">

                        <select name="idProduk"
                                class="form-select"
                                required>


                            <option value="">

                                Pilih Barang

                            </option>


                            {% for p in produk %}

                            <option value="{{ p[0] }}">

                                {{ p[1] }}

                            </option>

                            {% endfor %}


                        </select>

                    </div>



                    <!-- supplier -->
                    <div class="col-md-4">

                        <input type="text"
                               name="supplier"
                               class="form-control"
                               placeholder="Nama Supplier"
                               required>

                    </div>



                    <!-- qty -->
                    <div class="col-md-2">

                        <input type="number"
                               name="qty"
                               class="form-control"
                               placeholder="Qty"
                               required>

                    </div>



                    <!-- harga -->
                    <div class="col-md-2">

                        <input type="number"
                               name="harga"
                               class="form-control"
                               placeholder="Harga"
                               required>

                    </div>


                </div>



                <button class="btn btn-success">

                    Simpan Inventory

                </button>


            </form>



            <hr>



            <!-- history -->
            <table class="table table-bordered">


                <thead class="table-dark">

                    <tr>

                        <th>No</th>
                        <th>Tanggal</th>
                        <th>Supplier</th>
                        <th>Total</th>

                    </tr>

                </thead>



                <tbody>


                    {% for p in pembelian %}

                    <tr>

                        <td>{{ p[0] }}</td>

                        <td>{{ p[1] }}</td>

                        <td>{{ p[4] }}</td>

                        <td>{{ p[2] }}</td>

                    </tr>

                    {% endfor %}


                </tbody>

            </table>


        </div>

    </div>

</div>


</body>
</html>
