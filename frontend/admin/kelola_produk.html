<!DOCTYPE html>
<html>
<head>

    <title>Kelola Produk</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">


<div class="container mt-5">

    <div class="card shadow">


        <!-- Header -->
        <div class="card-header d-flex justify-content-between align-items-center">

            <h3 class="mb-0">

                Kelola Produk

            </h3>


            <a href="/admin"
               class="btn btn-secondary">
                Kembali
            </a>

        </div>

        
        <div class="card-body">


            <!-- form tambah -->
            <form action="/tambah_produk"
                  method="POST">

                <div class="row g-3 mb-4">


                    <div class="col-md-4">

                        <input type="text"
                               name="namaProduk"
                               class="form-control"
                               placeholder="Nama Produk"
                               required>

                    </div>



                    <div class="col-md-3">

                        <input type="number"
                               name="hargaJual"
                               class="form-control"
                               placeholder="Harga Jual"
                               required>

                    </div>



                    <div class="col-md-3">

                        <input type="number"
                               name="stok"
                               class="form-control"
                               placeholder="Stok"
                               required>

                    </div>



                    <div class="col-md-2">

                        <button class="btn btn-success w-100">

                            Tambah

                        </button>

                    </div>


                </div>

            </form>



            <!-- tabel -->
            <table class="table table-bordered table-striped">


                <thead class="table-dark">

                    <tr>

                        <th>ID</th>
                        <th>Nama Produk</th>
                        <th>Harga</th>
                        <th>Stok</th>
                        <th>Aksi</th>

                    </tr>

                </thead>



                <tbody>

                    {% for p in produk %}

                    <tr>

                        <td>{{ p[0] }}</td>

                        <td>{{ p[1] }}</td>

                        <td>{{ p[2] }}</td>

                        <td>{{ p[3] }}</td>


                        <td>


                            <button
                                class="btn btn-warning btn-sm"

                                data-bs-toggle="modal"

                                data-bs-target="#edit{{ p[0] }}">

                                Edit

                            </button>



                            <a href="/hapus_produk/{{ p[0] }}"
                               class="btn btn-danger btn-sm">

                                Hapus

                            </a>


                        </td>

                    </tr>



                    <!-- Modal edit -->
                    <div class="modal fade"
                         id="edit{{ p[0] }}">


                        <div class="modal-dialog">

                            <div class="modal-content">


                                <form action="/edit_produk"
                                      method="POST">


                                    <div class="modal-header">

                                        <h5>

                                            Edit Produk

                                        </h5>

                                    </div>



                                    <div class="modal-body">


                                        <input type="hidden"
                                               name="idProduk"
                                               value="{{ p[0] }}">


                                        <div class="mb-3">

                                            <label>Nama Produk</label>

                                            <input type="text"
                                                   name="namaProduk"
                                                   value="{{ p[1] }}"
                                                   class="form-control">

                                        </div>



                                        <div class="mb-3">

                                            <label>Harga</label>

                                            <input type="number"
                                                   name="hargaJual"
                                                   value="{{ p[2] }}"
                                                   class="form-control">

                                        </div>



                                        <div class="mb-3">

                                            <label>Stok</label>

                                            <input type="number"
                                                   name="stok"
                                                   value="{{ p[3] }}"
                                                   class="form-control">

                                        </div>


                                    </div>



                                    <div class="modal-footer">

                                        <button class="btn btn-success">

                                            Simpan

                                        </button>

                                    </div>


                                </form>

                            </div>

                        </div>

                    </div>


                    {% endfor %}

                </tbody>

            </table>


        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
