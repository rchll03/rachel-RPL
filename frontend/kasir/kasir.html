<!DOCTYPE html>
<html>
<head>

    <title>Dashboard Kasir</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Transaksi Kasir</h3>

            <a href="/logout" class="btn btn-danger">
                Logout
            </a>

        </div>

        <div class="card-body">

            <form action="/simpan_transaksi" method="POST">

                <table class="table table-bordered" id="tabelProduk">

                    <thead class="table-dark">

                        <tr>
                            <th>Produk</th>
                            <th>Harga</th>
                            <th>Qty</th>
                            <th>Subtotal</th>
                            <th>Aksi</th>
                        </tr>

                    </thead>

                    <tbody>

                        <tr>

                            <td>

                                <select name="idProduk[]"
                                        class="form-select produk"
                                        onchange="setHarga(this)">

                                    <option value="">Pilih Produk</option>

                                    {% for p in produk %}

                                    <option
                                        value="{{ p[0] }}"
                                        data-harga="{{ p[2] }}">

                                        {{ p[1] }}

                                    </option>

                                    {% endfor %}

                                </select>

                            </td>

                            <td>
                                <input type="number"
                                       name="harga[]"
                                       class="form-control harga"
                                       readonly>
                            </td>

                            <td>
                                <input type="number"
                                       name="qty[]"
                                       class="form-control qty"
                                       value="1"
                                       onkeyup="hitungSubtotal(this)">
                            </td>

                            <td>
                                <input type="number"
                                       name="subtotal[]"
                                       class="form-control subtotal"
                                       readonly>
                            </td>

                            <td>

                                <button type="button"
                                        class="btn btn-danger"
                                        onclick="hapusBaris(this)">

                                    Hapus

                                </button>

                            </td>

                        </tr>

                    </tbody>

                </table>

                <button type="button"
                        class="btn btn-primary"
                        onclick="tambahBaris()">

                    Tambah Produk

                </button>

                <hr>

                <div class="mb-3">

                    <label>Total</label>

                    <input type="number"
                           name="total"
                           id="total"
                           class="form-control"
                           readonly>

                </div>
                <div class="mb-3">

    <label>Pembayaran</label>

    <input type="number"
           name="bayar"
           id="bayar"
           class="form-control"
           onkeyup="hitungKembalian()">

</div>

<div class="mb-3">

    <label>Kembalian</label>

    <input type="number"
           id="kembalian"
           class="form-control"
           readonly>

</div>
    <div class="d-flex gap-2">

    <button type="submit"
            class="btn btn-success">

        Simpan Transaksi

    </button>
    
</div>

</form>

<script src="{{ url_for('static', filename='js/kasir.js') }}"></script>
</body>
</html>
